version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gastro_postgres
    environment:
      POSTGRES_USER: gastro_user
      POSTGRES_PASSWORD: gastro_password
      POSTGRES_DB: gastro_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastro_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gastro-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gastro_backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://gastro_user:gastro_password@postgres:5432/gastro_db
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - gastro-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gastro_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - gastro-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  gastro-network:
    driver: bridge
